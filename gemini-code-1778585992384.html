<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PHOTCAF 2.0 | Dashboard de Monitoramento</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg-base:       #181c1f;
    --bg-surface:    #1f2428;
    --bg-raised:     #252b30;
    --bg-overlay:    #2c3338;
    --neu-light:     #2d3540;
    --neu-dark:      #111417;
    --green:         #00ff88;
    --green-dim:     #00c96b;
    --green-glow:    rgba(0,255,136,0.18);
    --blue:          #00b4ff;
    --blue-dim:      #0082cc;
    --blue-glow:     rgba(0,180,255,0.18);
    --amber:         #f5a623;
    --red:           #ff4757;
    --text-primary:  #e8edf2;
    --text-secondary:#8fa3b1;
    --text-muted:    #556470;
    --border:        rgba(255,255,255,0.06);
    --font-display:  'Rajdhani', sans-serif;
    --font-mono:     'JetBrains Mono', monospace;
    --font-body:     'Exo 2', sans-serif;
    --radius-sm:     6px;
    --radius-md:     12px;
    --radius-lg:     18px;
    --radius-xl:     24px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(0,255,136,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(0,180,255,0.04) 0%, transparent 60%);
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: var(--bg-overlay); border-radius: 10px; }

  /* =============== HEADER =============== */
  header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 64px;
    background: rgba(24,28,31,0.92);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
  }
  .header-brand { display: flex; align-items: center; gap: 14px; }
  .brand-icon {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 14px var(--green-glow);
  }
  .brand-icon svg { width: 20px; height: 20px; fill: #0a0e10; }
  .brand-title {
    font-family: var(--font-display); font-size: 1.25rem;
    font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  }
  .brand-title span { color: var(--green); }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .system-time { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); }

  /* BLUETOOTH STATUS */
  .bt-indicator {
    display: flex; align-items: center; gap: 9px;
    padding: 6px 14px; border-radius: 50px;
    background: var(--bg-surface); border: 1px solid var(--border);
    box-shadow: inset 2px 2px 5px var(--neu-dark), inset -1px -1px 3px var(--neu-light);
  }
  .bt-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); transition: all 0.4s; }
  .bt-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green), 0 0 20px var(--green-glow); animation: pulse-dot 2s infinite; }
  .bt-dot.connecting { background: var(--amber); box-shadow: 0 0 8px var(--amber); animation: blink 0.7s infinite; }
  .bt-label { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 1.5px; color: var(--text-secondary); }
  .bt-label.connected { color: var(--green); }
  .bt-label.connecting { color: var(--amber); }

  @keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 6px var(--green); } 50% { box-shadow: 0 0 12px var(--green); } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* =============== MAIN LAYOUT =============== */
  main {
    max-width: 1380px; margin: 0 auto; padding: 2rem 1.5rem 3rem;
    display: grid; gap: 1.5rem;
    grid-template-areas:
      "control control control"
      "spectral spectral diag"
      "map      map      diag";
    grid-template-columns: 1fr 1fr 380px;
  }

  @media (max-width: 1100px) {
    main { grid-template-areas: "control" "spectral" "diag" "map"; grid-template-columns: 1fr; }
  }

  /* CARDS */
  .card {
    background: var(--bg-surface); border-radius: var(--radius-lg); border: 1px solid var(--border);
    padding: 1.5rem; box-shadow: 6px 6px 14px var(--neu-dark), -3px -3px 8px var(--neu-light);
  }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.4rem; }
  .card-tag { font-family: var(--font-mono); font-size: 0.6rem; padding: 3px 9px; border-radius: 50px; background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
  .card-tag.blue { background: rgba(0,180,255,0.1); color: var(--blue); border-color: rgba(0,180,255,0.2); }
  .card-title { font-family: var(--font-display); font-size: 1rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
  .section-line { flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }

  /* CONTROL PANEL */
  .control-panel { grid-area: control; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 2rem; }
  .control-stats { display: flex; gap: 1.2rem; flex-wrap: wrap; }
  .stat-chip { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.8rem 1.2rem; min-width: 110px; }
  .stat-chip-label { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 5px; }
  .stat-chip-value { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; color: var(--green); }
  .stat-chip-value.blue { color: var(--blue); }
  .stat-chip-value.amber { color: var(--amber); }
  
  .control-buttons { display: flex; flex-direction: column; gap: 1rem; align-items: center; }
